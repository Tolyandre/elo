version: "2"

sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "pkg/db/query"
    gen:
      go:
        package: "db"
        out: "pkg/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "uuid"
            go_type: "string"
          - db_type: "uuid"
            nullable: true
            go_type:
              type: "string"
              pointer: true
          # JSONB columns are scanned as raw bytes; the handler parses/validates
          # the document against a per-calculator-kind JSON schema (pkg/calculator).
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"
          - db_type: "jsonb"
            nullable: true
            go_type: "encoding/json.RawMessage"
