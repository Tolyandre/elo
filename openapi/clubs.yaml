# ─── Path items ──────────────────────────────────────────────────────────────

ClubsCollection:
  get:
    operationId: ListClubs
    tags: [clubs]
    summary: List all clubs
    responses:
      "200":
        description: List of clubs
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                data:
                  type: array
                  items:
                    $ref: '#/Club'
              required: [status, data]
  post:
    operationId: CreateClub
    tags: [clubs]
    summary: Create a new club
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
            required: [name]
    responses:
      "200":
        description: Created club
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                data:
                  $ref: '#/Club'
              required: [status, data]
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "409":
        description: Club with this name already exists
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'

ClubItem:
  get:
    operationId: GetClub
    tags: [clubs]
    summary: Get a club by ID
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Club details
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                data:
                  $ref: '#/Club'
              required: [status, data]
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "404":
        description: Club not found
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
  patch:
    operationId: PatchClub
    tags: [clubs]
    summary: Update club name
    security:
      - cookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
            required: [name]
    responses:
      "200":
        description: Updated club
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                data:
                  $ref: '#/Club'
              required: [status, data]
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "404":
        description: Club not found
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
  delete:
    operationId: DeleteClub
    tags: [clubs]
    summary: Delete a club
    security:
      - cookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Club deleted
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiSuccessMessage'
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "404":
        description: Club not found
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'

ClubMembers:
  post:
    operationId: AddClubMember
    tags: [clubs]
    summary: Add a player to a club
    security:
      - cookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              player_id:
                type: integer
            required: [player_id]
    responses:
      "200":
        description: Member added
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiSuccessMessage'
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'

ClubMemberItem:
  delete:
    operationId: RemoveClubMember
    tags: [clubs]
    summary: Remove a player from a club
    security:
      - cookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: playerId
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Member removed
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiSuccessMessage'
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'

# ─── Schemas ─────────────────────────────────────────────────────────────────

Club:
  type: object
  properties:
    id:
      type: string
    name:
      type: string
    geologist_name:
      type: string
      nullable: true
    players:
      type: array
      items:
        type: integer
      description: List of player IDs (integers)
  required: [id, name, players]
