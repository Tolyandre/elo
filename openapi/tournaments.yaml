# ─── Path items ──────────────────────────────────────────────────────────────

TournamentsCollection:
  get:
    operationId: ListTournaments
    tags: [tournaments]
    summary: List all tournaments (newest start date first)
    responses:
      "200":
        description: List of tournaments
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                data:
                  type: array
                  items:
                    $ref: '#/Tournament'
              required: [status, data]
  post:
    operationId: CreateTournament
    tags: [tournaments]
    summary: Create a new tournament
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/TournamentInput'
    responses:
      "200":
        description: Created tournament
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                data:
                  $ref: '#/Tournament'
              required: [status, data]
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "409":
        description: Tournament with this name already exists
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'

TournamentItem:
  get:
    operationId: GetTournament
    tags: [tournaments]
    summary: Get a tournament by ID
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Tournament details
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                data:
                  $ref: '#/Tournament'
              required: [status, data]
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "404":
        description: Tournament not found
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
  put:
    operationId: UpdateTournament
    tags: [tournaments]
    summary: Update a tournament's name, dates and participants
    security:
      - cookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/TournamentInput'
    responses:
      "200":
        description: Updated tournament
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                data:
                  $ref: '#/Tournament'
              required: [status, data]
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "404":
        description: Tournament not found
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "409":
        description: >-
          Conflict — a removed participant has played a match in the tournament,
          or the new dates do not cover already-played matches.
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
  delete:
    operationId: DeleteTournament
    tags: [tournaments]
    summary: Delete a tournament (only when it has no participants)
    security:
      - cookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Tournament deleted
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiSuccessMessage'
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "404":
        description: Tournament not found
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "409":
        description: Cannot delete a tournament that still has participants
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'

TournamentStatsPath:
  get:
    operationId: GetTournamentStats
    tags: [tournaments]
    summary: Per-player medal statistics for a tournament
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Tournament statistics
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                data:
                  $ref: '#/TournamentStats'
              required: [status, data]
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'

# ─── Schemas ─────────────────────────────────────────────────────────────────

TournamentInput:
  type: object
  properties:
    id:
      $ref: './common.yaml#/ULID'
    name:
      type: string
    start_date:
      type: string
      format: date-time
    end_date:
      type: string
      format: date-time
    player_ids:
      type: array
      items:
        type: string
      description: Full desired set of participant player IDs
  required: [id, name, start_date, end_date]

Tournament:
  type: object
  properties:
    id:
      type: string
    name:
      type: string
    start_date:
      type: string
      format: date-time
    end_date:
      type: string
      format: date-time
    players:
      type: array
      items:
        type: string
      description: List of participant player IDs
  required: [id, name, start_date, end_date, players]

TournamentStatsPlayer:
  type: object
  properties:
    player_id:
      type: string
    matches_count:
      type: integer
    first:
      type: integer
    second:
      type: integer
    third:
      type: integer
    fourth:
      type: integer
  required: [player_id, matches_count, first, second, third, fourth]

TournamentStats:
  type: object
  properties:
    players:
      type: array
      items:
        $ref: '#/TournamentStatsPlayer'
  required: [players]
