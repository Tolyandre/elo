ApiError:
  type: object
  properties:
    status:
      type: string
      enum: [fail]
    message:
      type: string
  required: [status, message]

ApiSuccessMessage:
  type: object
  properties:
    status:
      type: string
      enum: [success]
    message:
      type: string
  required: [status, message]

ULID:
  type: string
  description: >-
    Client-generated UUIDv7, encoded as a short Base58 string (~22 chars, Bitcoin
    alphabet — no 0/O/I/l). The client generates this on create; it serves as
    both the primary key and the idempotency key. A repeated request with the same
    id returns the already-created entity. The backend also accepts the standard
    36-char canonical UUID form for backward compatibility.
