ApiError:
  type: object
  properties:
    status:
      type: string
      enum: [fail]
    message:
      type: string
  required: [status, message]

ApiSuccessMessage:
  type: object
  properties:
    status:
      type: string
      enum: [success]
    message:
      type: string
  required: [status, message]

ULID:
  type: string
  description: >-
    Client-generated UUIDv7 (standard 36-char UUID, time-ordered and
    lexicographically sortable). The client generates this on create; it serves
    as both the primary key and the idempotency key. A repeated request with the
    same id returns the already-created entity.
