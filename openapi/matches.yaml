# ─── Path items ──────────────────────────────────────────────────────────────

MatchesCollection:
  get:
    operationId: ListMatches
    tags: [matches]
    summary: List matches with cursor-based pagination
    parameters:
      - name: game_id
        in: query
        schema:
          type: string
        description: Filter by game ID
      - name: player_id
        in: query
        schema:
          type: string
        description: Filter by player ID
      - name: club_id
        in: query
        schema:
          type: string
        description: Filter by club ID; use "__no_club__" for players without a club
      - name: next
        in: query
        schema:
          type: string
        description: Cursor token from previous page's "next" field
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 30
        description: Number of matches per page
    responses:
      "200":
        description: Paginated match list
        content:
          application/json:
            schema:
              $ref: '#/MatchesPage'
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
  post:
    operationId: AddMatch
    tags: [matches]
    summary: Add a new match
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              id:
                $ref: './common.yaml#/ULID'
              game_id:
                type: string
              score:
                type: object
                additionalProperties:
                  type: number
                  format: double
                description: Map of player_id (string) to numeric score
              date:
                type: string
                format: date-time
                description: >-
                  Optional match time for offline-created matches. Must not be in
                  the future and not older than 30 days; Elo is recalculated from
                  this date. When omitted the server uses the current time.
              tournament_ids:
                type: array
                items:
                  type: string
                description: >-
                  Optional tournament IDs this match belongs to. Every match
                  player is auto-enrolled into each tournament.
              calculator_kind:
                type: string
                nullable: true
                description: >-
                  Identifier of the calculator that produced this match
                  (e.g. "skull-king", "iaww"). When set, calculator_data is
                  required and is validated server-side against the JSON Schema
                  registered for this kind (see pkg/calculator). When absent,
                  the match was created via the generic form.
              calculator_data:
                type: object
                nullable: true
                description: >-
                  Intermediate calculator state (round-by-round / cell-by-cell
                  breakdown). Opaque at the OpenAPI layer; validated against a
                  per-calculator-kind JSON Schema in the Go handler. Stored in a
                  normalized shape where every player reference lives under a
                  key named "player_id" so the idcodec middleware rewrites ids
                  at the HTTP boundary.
            required: [id, game_id, score]
    responses:
      "200":
        description: Match added
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                data:
                  type: object
                  properties:
                    id:
                      type: string
                  required: [id]
              required: [status, data]
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "409":
        description: History change conflict
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'

MatchItem:
  get:
    operationId: GetMatchById
    tags: [matches]
    summary: Get a match by ID
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Match details
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                data:
                  $ref: '#/Match'
              required: [status, data]
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "404":
        description: Match not found
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
  put:
    operationId: UpdateMatch
    tags: [matches]
    summary: Update a match (scores and date)
    security:
      - cookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              game_id:
                type: string
              score:
                type: object
                additionalProperties:
                  type: number
                  format: double
                description: Map of player_id (string) to numeric score
              date:
                type: string
                format: date-time
              tournament_ids:
                type: array
                items:
                  type: string
                description: >-
                  Tournament IDs this match belongs to. Associations are replaced
                  with this set; players are enrolled but never un-enrolled.
              calculator_kind:
                type: string
                nullable: true
                description: >-
                  Identifier of the calculator that produced this match
                  (e.g. "skull-king", "iaww"). Validated server-side against the
                  JSON Schema registered for this kind (see pkg/calculator). Set
                  to null to clear calculator data on the match.
              calculator_data:
                type: object
                nullable: true
                description: >-
                  Intermediate calculator state. Opaque at the OpenAPI layer;
                  validated against a per-calculator-kind JSON Schema in the Go
                  handler. Required when calculator_kind is non-null.
            required: [game_id, score, date]
    responses:
      "200":
        description: Match updated
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiSuccessMessage'
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "404":
        description: Match not found
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'
      "409":
        description: History change conflict
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'

MatchMarketsPath:
  get:
    operationId: GetMarketsByMatchId
    tags: [matches, markets]
    summary: Get markets associated with a match
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Markets for the match
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                data:
                  type: array
                  items:
                    $ref: './markets.yaml#/Market'
              required: [status, data]
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: './common.yaml#/ApiError'

# ─── Schemas ─────────────────────────────────────────────────────────────────

MatchTournament:
  type: object
  description: A tournament a match belongs to
  properties:
    id:
      type: string
    name:
      type: string
  required: [id, name]

MatchPlayer:
  type: object
  description: Per-player data within a match (keyed by player_id in the score map)
  properties:
    rating_staked:
      type: number
      format: double
    rating_earned:
      type: number
      format: double
    score:
      type: number
      format: double
    rating_after:
      type: number
      format: double
  required: [rating_staked, rating_earned, score, rating_after]

Match:
  type: object
  properties:
    id:
      type: string
    game_id:
      type: string
    game_name:
      type: string
    date:
      type: string
      format: date-time
    score:
      type: object
      additionalProperties:
        $ref: '#/MatchPlayer'
      description: Map of player_id (string) to player score data
    has_markets:
      type: boolean
    tournaments:
      type: array
      items:
        $ref: '#/MatchTournament'
      description: Tournaments this match belongs to
    calculator_kind:
      type: string
      nullable: true
      description: >-
        Identifier of the calculator that produced this match, or null when the
        match was created via the generic form. Clients use this to decide
        whether to open the match in the calculator (history mode) or the
        generic edit form.
    calculator_data:
      type: object
      nullable: true
      description: >-
        Intermediate calculator state. Present only when calculator_kind is
        non-null. Opaque at the OpenAPI layer; see pkg/calculator for the
        per-kind JSON Schemas.
  required: [id, game_id, game_name, date, score, has_markets]

MatchesPage:
  type: object
  properties:
    status:
      type: string
    data:
      type: array
      items:
        $ref: '#/Match'
    next:
      type: string
      nullable: true
      description: Cursor token for the next page; null if no more pages
  required: [status, data]
