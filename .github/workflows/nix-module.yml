name: Build and test nix module

on:
  push:
    branches: [ "main" ]
    paths: ["elo-web-service/**", "nix/**", "flake.nix", "flake.lock"]

  pull_request:
    branches: [ "main" ]
    paths: ["elo-web-service/**", "nix/**", "flake.nix", "flake.lock"]

jobs:
  nix-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-25.11
          extra_nix_config: "experimental-features = nix-command flakes"

      - name: Check module evaluation
        working-directory: ./nix
        run: nix-instantiate --strict test-syntax.nix

      - name: Check flake
        run: nix flake check
