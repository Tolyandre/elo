# Sample workflow for building and deploying a Next.js site to GitHub Pages
#
# To get started with Next.js see: https://nextjs.org/docs/getting-started
#
name: Deploy Next.js site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
    paths: ["nextjs/**"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_ELO_WEB_SERVICE_BASE_URL: https://toly.is-cool.dev/elo-web-service
      # basePath is set explicitly (used by next.config.ts for the app, service
      # worker precache URLs and web manifest) instead of being injected by
      # actions/configure-pages.
      NEXT_PUBLIC_BASE_PATH: /elo
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-26.05
          extra_nix_config: "experimental-features = nix-command flakes"
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
          package_json_file: nextjs/package.json
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - name: Restore pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('nextjs/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: nextjs/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('nextjs/pnpm-lock.yaml') }}-${{ hashFiles('nextjs/**/*.[jt]s', 'nextjs/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('nextjs/pnpm-lock.yaml') }}-
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Install dependencies
        # This install only feeds the vitest run below; the deployed artifact is
        # built by Nix. --ignore-scripts sidesteps pnpm 10+'s ERR_PNPM_IGNORED_BUILDS
        # hard failure on dependency build scripts the tests don't need (native
        # binaries come via optionalDependencies). pnpm-workspace.yaml's
        # onlyBuiltDependencies still governs the real (Nix) build.
        run: pnpm --dir ./nextjs install --frozen-lockfile --ignore-scripts
      - name: Run tests
        run: pnpm --dir ./nextjs test --run --reporter dot
        env:
          CI: true
      # Build via the Nix package used for the on-prem (stage/domain) deploys, so
      # the same artifact and build path are exercised by the production pipeline.
      # NEXT_PUBLIC_* values are baked into the package defaults (basePath "/elo",
      # prod backend); the precache revision is the flake's git rev.
      - name: Build with Nix
        run: nix build .#frontend --print-out-paths
      - name: Copy static export to ./nextjs/out
        run: cp -rL --no-preserve=mode,ownership result ./nextjs/out

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./nextjs/out

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
