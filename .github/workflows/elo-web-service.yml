# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Build elo-web-service

on:
  push:
    branches: [ "main" ]
    paths: ["elo-web-service/**"]

  pull_request:
    branches: [ "main" ]
    paths: ["elo-web-service/**"]

jobs:

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./elo-web-service
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24.5'

    - name: Cache OpenCV build
      id: cache-opencv
      uses: actions/cache@v4
      with:
        path: /usr/local/lib/pkgconfig/opencv4.pc
        key: opencv-4.13.0-ubuntu-latest

    - name: Download Go modules
      run: go mod download

    - name: Install OpenCV 4.13.0
      if: steps.cache-opencv.outputs.cache-hit != 'true'
      run: |
        cd $(go env GOPATH)/pkg/mod/gocv.io/x/gocv@v0.43.0
        sudo make install

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...

  integration-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./elo-web-service
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24.5'

    - name: Cache OpenCV build
      id: cache-opencv
      uses: actions/cache@v4
      with:
        path: /usr/local/lib/pkgconfig/opencv4.pc
        key: opencv-4.13.0-ubuntu-latest

    - name: Download Go modules
      run: go mod download

    - name: Install OpenCV 4.13.0
      if: steps.cache-opencv.outputs.cache-hit != 'true'
      run: |
        cd $(go env GOPATH)/pkg/mod/gocv.io/x/gocv@v0.43.0
        sudo make install

    - name: Integration Tests
      # Docker is available on ubuntu-latest; testcontainers-go uses the Docker socket directly.
      # No `services:` block needed — each test spins up its own isolated container.
      run: go test -v -tags integration ./...
